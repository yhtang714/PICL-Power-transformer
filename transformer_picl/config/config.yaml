# ----------------------------------------------------------------------
# PICL configuration (physics-informed causal learning)
# Hyperparameters are taken from the paper where stated and tuned
# conservatively for CPU-friendly runtime on 1,648 samples otherwise.
# ----------------------------------------------------------------------

experiment:
  name: "PICL_transformer_diagnosis"
  seed: 42
  device: "auto"   # auto | cpu | cuda | mps

data:
  # Variable ordering is fixed throughout the pipeline.
  fault_types: ["PD", "D1", "D2", "T1", "T2", "T3"]
  gas_types:   ["H2", "CH4", "C2H2", "C2H4", "C2H6"]

  csv_path: "data/dga_1648_samples_stratified_no_source.csv"

  # Number of synthetic sources used to partition the training set.
  # The paper uses E = 5 real sources; the released CSV has no source
  # column, so we partition training samples into 5 synthetic sources
  # by stratified round-robin assignment.  This keeps the multi-source
  # code path (Eq. 6) exercised and gives each source enough samples
  # to fit its own noise variance.
  n_sources: 5

  # Gas feature mode:
  #   proportion : raw proportions summing to 1 (the paper's default,
  #                Section 3.1).  This matches the paper's stated SCM
  #                but in practice yields poor class separation under
  #                the linear-Gaussian approximation because class
  #                signatures are close to the simplex vertices.
  #   log1p_z    : log1p of imputed raw ppm values, z-scored per gas on
  #                the training split.  This breaks strict fidelity to
  #                the paper's "proportions" convention but is in the
  #                spirit of the paper's own acknowledgement that the
  #                linear-Gaussian SCM is a tractability approximation
  #                (Section 3.1, end of paragraph).  Highly recommended
  #                for reproducing classifier-family accuracy on this
  #                data (see README).
  gas_feature_mode: "log1p_z"

model:
  # Beta prior concentration (Section 3.2.2 / Table 5)
  kappa: 10

  # Binary Concrete annealing (Section 4.2.2)
  temperature_init: 1.0
  temperature_final: 0.05

  # Acyclicity penalty weight (Eq. 6) applied to E[A]
  acyclicity_weight: 1.0e-2

  # Initial log-noise-variance per variable per source
  noise_log_var_init: 0.0     # log(1.0) = 0.0

  # Regularisation on discoverable weights (Gaussian prior scale).
  weight_prior_scale_plausible: 0.5
  weight_prior_scale_unknown: 0.3
  weight_prior_scale_hard: 1.0

  # ELBO component balance.  The raw ELBO of Eq. 6 corresponds to
  # kl_weight = n_effective (since we divide the likelihood by n_eff
  # for numerical stability); we use a smaller positive value that
  # empirically keeps q(Gamma) close to its prior while still letting
  # real signals emerge.  Tune upward to enforce sparser graphs.
  kl_weight: 200.0
  weight_reg_weight: 200.0

  # Discriminative auxiliary loss (v4 improvement).
  # 0.0 recovers the paper's pure generative ELBO.  Positive values
  # add a cross-entropy term CE(P(f|y), y_true) that directly rewards
  # correct classification, shaping W and sigma^2 for class separation.
  # Even with this, the linear-Gaussian posterior has a fundamental
  # ~82% ceiling on this data (equivalent to LDA); set
  # classifier_head.enabled=true below to cross 90%.
  discriminative_weight: 1.0

  # Class-balanced likelihood weighting (v4 improvement).
  # When true, each sample contributes weight N/(K*count_of_its_class)
  # to the likelihood, so minority classes (D2 at n=102, T2 at n=142)
  # aren't drowned out by common classes.  Critical for hard-edge
  # weights to learn the correct physical ordering
  # (D2 -> C2H2 should be stronger than D1 -> C2H2, etc.).
  class_balanced_loss: true

  # Additional structural forbids.  The paper does not explicitly add
  # these to the forbidden set, but fault->fault and gas->gas edges
  # correspond to non-physical dependencies in a fault-diagnosis SCM
  # and their posteriors in Table 8 are all below 0.5.  Forbidding
  # them up-front prevents spurious overfitting to noise.
  forbid_fault_to_fault: true
  forbid_gas_to_gas: false

training:
  # Phase 1: joint learning on the original training data (Sec. 4.2-4.3).
  # Defaults chosen to converge reliably in <2 min on CPU for the 987-
  # sample training split.  Increase to 400+ epochs for lower loss if
  # you have the time budget.
  phase1:
    epochs: 200
    lr: 1.0e-2

  # Phase 2 structure (Module B on augmented real samples only).
  phase2_structure:
    epochs: 100
    lr: 5.0e-3

  # Phase 2 parameters (Module C on real + synthetic samples).
  phase2_params:
    epochs: 100
    lr: 5.0e-3

  grad_clip: 5.0

augmentation:
  # Target dataset size after augmentation (real + synthetic).
  # Section 4.3 / Table 7. We default to 4k; 10k is also supported
  # but produces diminishing returns and longer runtime.
  target_size: 4000

  # Intervention activation levels (Section 4.4.2 / Eq. 15)
  intervention_levels: [0.5, 0.75, 1.0, 1.25, 1.5]

  # Plausibility filter ratio r (Section 4.4.2):
  # keep synthetic sample (y_tilde, target class k) iff
  #     P(f=k | y_tilde) >= r * max_{j!=k} P(f=j | y_tilde)
  plausibility_ratio: 1.5

  # Hard multiplicative cap on how many synthetic samples any class
  # may receive per real sample (protects rare classes from explosion).
  max_synthetic_ratio: 100.0

inference:
  # Module E: S graphs drawn from q(Gamma) for posterior averaging
  # (Eq. 16).  The paper uses S = 50.
  n_graph_samples: 50

  # Composite score weights (Eq. 20).
  gate_weights:
    posterior: 0.4
    disablement: 0.3
    sufficiency: 0.3

  # Temperature calibration on Dcal.
  temperature_scaling: true

  # Threshold search grid.
  threshold_grid_min: 0.20
  threshold_grid_max: 0.99
  threshold_grid_steps: 160

  # Gate threshold selection mode:
  #   "max_cov_acc"  -> maximise coverage * accuracy on Dcal (paper default)
  #   "target_cov"   -> find gamma* that gives coverage closest to target_coverage
  #                     on Dcal (paper reports 94.8% @ 87.9% coverage)
  threshold_mode: "target_cov"
  target_coverage: 0.879

# ----------------------------------------------------------------------
# Phase 4 (v4 improvement): post-hoc non-linear classifier head.
#
# The linear-Gaussian SCM with one-hot fault observations produces a
# class posterior that is LINEAR in y (equivalent to LDA).  Empirically
# this has a ~82% accuracy ceiling on this data, while non-linear
# classifiers (RF, GB) hit 95%.  To close the gap while preserving the
# paper's causal pipeline for interpretability, we train a Gradient
# Boosting classifier on features DERIVED FROM the trained SCM:
#   * raw y
#   * E[f | y] under the SCM's joint Gaussian  (conditional expectation)
#   * ||y - E[Y | do(f=e_k)]||  for each class k   (residual distances)
#   * Ed(y, k), Es(y, k)                            (causal disablement/
#                                                    sufficiency scores)
#
# The causal graph, do-interventions, plausibility filter, and Ed/Es
# remain exactly as specified by the paper; only the final P(f|Y) step
# of the composite score is replaced with the classifier's predictions.
# Disable (enabled: false) to fall back to the paper's exact posterior.
# ----------------------------------------------------------------------
classifier_head:
  enabled: true
  model: "gradient_boosting"   # ignored when ensemble=true
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.05

  # v5 knobs:
  # ensemble: average predict_proba from GB + RF + LR (usually +1-3%)
  # train_on_real_only: skip synthetic samples from Module D when
  #   training the classifier.  Prevents the SCM's linear-generator bias
  #   from leaking into the non-linear boundary - often helps when
  #   the SCM's generated samples don't match the real DGA-ratio
  #   distribution of the target class.
  ensemble: true
  train_on_real_only: true
