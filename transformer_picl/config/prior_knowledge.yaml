# ----------------------------------------------------------------------
# PICL prior knowledge - encodes the graded physical structure of IEC
# 60599 as required by the paper (Table 5 and Section 3.2).
#
# * hard_edges    : electrochemically established (G_hard).  Adjacency
#                   frozen at 1, weight constrained positive via a
#                   softplus reparameterisation (log-barrier).
# * plausible_edges : condition-dependent relations from IEC 60599
#                   interpretive guidance (G_dataP).  Beta(alpha0, beta0)
#                   prior with (alpha0, beta0) = (pi * kappa, (1-pi) * kappa).
# * forbidden_edges : gas->fault directions and self-loops.  Permanently
#                   excluded (weight fixed at 0, adjacency 0).
# * unknown_edges : all remaining candidate edges (G_dataU) receive a
#                   uniform Beta(1, 1) prior.  Listed explicitly here so
#                   the candidate set is transparent and reproducible.
# ----------------------------------------------------------------------

hard_edges:
  - {src: PD, tgt: H2,   pi: 1.0, rationale: "PD -> H2: consistent hydrogen generation in partial discharge"}
  - {src: D1, tgt: C2H2, pi: 1.0, rationale: "D1 -> C2H2: low-energy discharges generate acetylene"}
  - {src: D2, tgt: C2H2, pi: 1.0, rationale: "D2 -> C2H2: high-energy arcing strongly generates acetylene"}
  - {src: D2, tgt: H2,   pi: 1.0, rationale: "D2 -> H2: high-energy discharges also produce substantial H2"}
  - {src: T1, tgt: CH4,  pi: 1.0, rationale: "T1 -> CH4: low-temperature thermal faults produce methane"}
  - {src: T3, tgt: C2H4, pi: 1.0, rationale: "T3 -> C2H4: severe thermal cracking produces ethylene"}

plausible_edges:
  - {src: PD, tgt: CH4,  pi: 0.30, rationale: "CH4 appears in some corona events; condition-dependent"}
  - {src: T2, tgt: C2H4, pi: 0.60, rationale: "C2H4 common near the 700 degC upper limit of T2"}
  - {src: T3, tgt: C2H2, pi: 0.20, rationale: "Trace C2H2 may appear in extreme thermal cases"}

# All other fault->gas or gas->gas pairs that are NOT in
# hard_edges, plausible_edges, or forbidden_edges are treated as
# G_dataU with Beta(1,1) priors.  The candidate set is computed in
# code as: all (u,v) where u != v, u is not a gas when v is a fault,
# minus the edges already listed above.

# Forbidden edges are any directions that violate the physics:
# gas -> fault (gases are diagnostic effects, not causes) and
# self-loops.  These are enumerated programmatically.
